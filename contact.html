<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Contact — Walid Kettab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:ital,wght@0,400;0,500;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/global.css">
<style>
  /* CONTACT PAGE STYLES */
  .contact-page {
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:8rem 4rem;
    position:relative;
    z-index:1;
    text-align:center;
  }
  .contact-head {
    font-size:clamp(4rem, 12vw, 12rem);
    font-weight:700;
    letter-spacing:-0.05em;
    color:var(--white);
    line-height:0.9;
    margin-bottom:3rem;
  }
  .contact-head em {
    font-style:italic;
    color:rgba(255,255,255,0.4);
  }
  .contact-info {
    font-family:var(--f-mono);
    font-size:1.1rem;
    letter-spacing:0.1em;
    color:rgba(216,216,216,0.7);
    margin-bottom:4rem;
  }
  .contact-links {
    display:flex;
    gap:2rem;
    align-items:center;
  }
  .social-link {
    font-family:var(--f-mono);
    font-size:0.8rem;
    letter-spacing:0.2em;
    text-transform:uppercase;
    color:var(--white);
    padding-bottom:0.5rem;
    position:relative;
  }
  .social-link::after {
    content:''; position:absolute; bottom:0; left:0;
    width:100%; height:1px; background:var(--white);
    transform:scaleX(0); transform-origin:right;
    transition:transform .4s var(--ease);
  }
  .social-link:hover::after {
    transform:scaleX(1); transform-origin:left;
  }
</style>
</head>
<body>

<div id="cursor-dot"></div>

    <span class="status-dot"></span> Open for new opportunities
  </div>

    Let's create<br><em>impact.</em>
  </h1>

    <a href="#" class="social-link">LINKEDIN</a>

  </div>
</div>
